plugins {
    id 'com.android.application'
}
android {
    namespace 'com.baiyang.music'
    compileSdk 22
    defaultConfig {
        applicationId 'com.baiyang.music'
        minSdk 22
        targetSdk 22
        versionCode 1
        versionName '1.0'
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.0.0'
}
